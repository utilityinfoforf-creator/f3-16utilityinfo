<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../assets/styles.css">
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#0066FF">
  <style>
    /* Inline styles to ensure visibility */
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .login-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 1000; }
    .login-screen.active { display: flex; }
    .login-container { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .login-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 90%; max-width: 400px; }
    .login-box h1 { margin: 0 0 1rem 0; font-size: 28px; text-align: center; color: #333; }
    .login-box p { margin: 0 0 1.5rem 0; font-size: 14px; color: #666; text-align: center; }
    .role-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 2rem 0; }
    .role-btn { padding: 20px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; font-weight: 600; }
    .role-btn:hover { border-color: #667eea; background: #f5f7ff; transform: translateY(-2px); }
    .role-btn-icon { font-size: 32px; margin-bottom: 8px; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 0.5rem; color: #333; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #667eea; color: white; margin-top: 1rem; }
    .btn-primary:hover { background: #5568d3; }
    .btn-text { background: none; color: #667eea; padding: 8px; }
    .btn-text:hover { background: #f5f7ff; }
    .error { background: #fee; color: #c33; padding: 12px; border-radius: 6px; font-size: 12px; margin-top: 1rem; display: none; }
    .error.show { display: block; }
    .otp-inputs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 1.5rem 0; }
    .otp-input { width: 100%; padding: 12px; font-size: 18px; text-align: center; border: 1px solid #ddd; border-radius: 6px; }
    .otp-input:focus { outline: none; border-color: #667eea; }
    .dashboard { display: none; padding: 20px; background: #f9f9f9; min-height: 100vh; }
    .dashboard.active { display: block; }
    .header { background: white; padding: 1rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .logout-btn { background: #667eea; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<!-- LOGIN: Role Selection -->
<div id="screen-role" class="login-screen active">
  <div class="login-container">
    <div class="login-box">
      <h1>⚡ Utility Portal</h1>
      <p>Choose your account type to continue</p>
      <div class="role-buttons">
        <button class="role-btn" onclick="selectRole('tenant')">
          <div class="role-btn-icon">👤</div>
          <div>Tenant</div>
          <div style="font-size: 11px; opacity: 0.7; margin-top: 4px;">Manage your unit</div>
        </button>
        <button class="role-btn" onclick="selectRole('landlord')">
          <div class="role-btn-icon">🏢</div>
          <div>Landlord</div>
          <div style="font-size: 11px; opacity: 0.7; margin-top: 4px;">Manage properties</div>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- LOGIN: Customer ID -->
<div id="screen-login" class="login-screen">
  <div class="login-container">
    <div class="login-box">
      <h1>🔐 Login</h1>
      <p id="login-subtitle">Enter your Customer ID</p>
      <div class="form-group">
        <label for="customerId">Customer ID</label>
        <input id="customerId" type="text" placeholder="e.g., CUST-12345" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="submitCustomerId()">Continue →</button>
      <div id="login-error" class="error"></div>
      <button class="btn btn-text" onclick="goBack()">← Back</button>
    </div>
  </div>
</div>

<!-- LOGIN: OTP Verification -->
<div id="screen-otp" class="login-screen">
  <div class="login-container">
    <div class="login-box">
      <h1>✓ Verify</h1>
      <p>Enter the 6-digit code sent to<br><strong id="otp-email">your email</strong></p>
      <div class="otp-inputs" id="otpContainer">
        <input class="otp-input" id="otp1" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-input" id="otp2" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-input" id="otp3" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-input" id="otp4" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-input" id="otp5" type="text" maxlength="1" inputmode="numeric">
        <input class="otp-input" id="otp6" type="text" maxlength="1" inputmode="numeric">
      </div>
      <button class="btn btn-primary" onclick="verifyOTP()">Verify</button>
      <div id="otp-error" class="error"></div>
      <button class="btn btn-text" onclick="goBack()">← Back</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="dashboard">
  <div class="header">
    <h2>⚡ Utility Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <div style="max-width: 1200px; margin: 0 auto;">
    <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
      <h3>Welcome, <span id="user-name">User</span>!</h3>
      <p>Your utility account dashboard</p>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;">
        <div style="background: #f5f7ff; padding: 20px; border-radius: 8px;">
          <div style="font-size: 12px; color: #666;">Electric Balance</div>
          <div style="font-size: 24px; font-weight: bold; margin-top: 8px;">৳ 0.00</div>
        </div>
        <div style="background: #f0fdf4; padding: 20px; border-radius: 8px;">
          <div style="font-size: 12px; color: #666;">Water Status</div>
          <div style="font-size: 24px; font-weight: bold; margin-top: 8px;">Active</div>
        </div>
        <div style="background: #fef3c7; padding: 20px; border-radius: 8px;">
          <div style="font-size: 12px; color: #666;">Alert Zone</div>
          <div style="font-size: 24px; font-weight: bold; margin-top: 8px;">Safe</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../assets/script.js"></script>
<script>
// Simple login flow
let currentRole = null;
let currentCustomerId = null;
let currentOTPSession = null;

function showScreen(screen) {
  document.querySelectorAll('.login-screen, .dashboard').forEach(el => {
    el.classList.remove('active');
  });
  document.getElementById('screen-' + screen).classList.add('active');
}

function selectRole(role) {
  currentRole = role;
  localStorage.setItem('userRole', role);
  showScreen('login');
  document.getElementById('login-subtitle').textContent = `Enter your ${role === 'tenant' ? 'Tenant' : 'Landlord'} ID`;
  document.getElementById('customerId').focus();
}

function goBack() {
  if (currentCustomerId) {
    currentCustomerId = null;
    showScreen('role');
  } else {
    showScreen('login');
  }
}

async function submitCustomerId() {
  const id = document.getElementById('customerId').value.trim();
  const errorEl = document.getElementById('login-error');

  if (!id) {
    errorEl.textContent = 'Please enter a Customer ID';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');

  try {
    const apiUrl = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(`${apiUrl}?id=${encodeURIComponent(id)}&action=getOTPStep&role=${encodeURIComponent(currentRole)}`);

    if (!res.ok) throw new Error('Network error');
    const data = await res.json();

    if (data.error) {
      errorEl.textContent = data.error;
      errorEl.classList.add('show');
      return;
    }

    currentCustomerId = id;
    currentOTPSession = { customerId: id, email: data.email || 'your email' };

    document.getElementById('otp-email').textContent = data.email || 'your email';
    document.getElementById('otp1').focus();
    showScreen('otp');
  } catch (err) {
    errorEl.textContent = 'Network error: ' + err.message;
    errorEl.classList.add('show');
  }
}

async function verifyOTP() {
  const otp = Array.from({length: 6}, (_, i) => document.getElementById(`otp${i+1}`).value).join('');
  const errorEl = document.getElementById('otp-error');

  if (otp.length !== 6) {
    errorEl.textContent = 'Please enter all 6 digits';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');

  try {
    const apiUrl = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify({
        customerId: currentCustomerId,
        otp: otp,
        action: 'verifyOTP',
        role: currentRole
      })
    });

    if (!res.ok) throw new Error('Network error');
    const data = await res.json();

    if (data.error) {
      errorEl.textContent = data.error;
      errorEl.classList.add('show');
      return;
    }

    // Login successful
    localStorage.setItem('customerId', currentCustomerId);
    localStorage.setItem('customerName', data.name || 'User');
    localStorage.setItem('customerEmail', data.email || '');

    document.getElementById('user-name').textContent = data.name || 'User';
    showScreen('dashboard');
  } catch (err) {
    errorEl.textContent = 'Verification failed: ' + err.message;
    errorEl.classList.add('show');
  }
}

function logout() {
  localStorage.removeItem('customerId');
  localStorage.removeItem('customerName');
  localStorage.removeItem('customerEmail');
  currentCustomerId = null;
  currentRole = null;
  document.getElementById('customerId').value = '';
  showScreen('role');
}

// Check if already logged in
window.addEventListener('load', () => {
  const savedId = localStorage.getItem('customerId');
  if (savedId) {
    document.getElementById('user-name').textContent = localStorage.getItem('customerName') || 'User';
    showScreen('dashboard');
  }
});
</script>

</body>
</html>
