<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0066FF">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    .screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 999; }
    .screen.active { display: flex; }

    .login-screen { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); align-items: center; justify-content: center; }
    .login-box { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 95%; max-width: 450px; }
    .login-box h1 { font-size: 32px; margin-bottom: 16px; text-align: center; color: #222; }
    .login-box p { font-size: 15px; color: #666; text-align: center; margin-bottom: 32px; line-height: 1.5; }

    .role-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .role-btn {
      padding: 28px 16px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      color: #333;
    }
    .role-btn:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
    }
    .role-btn-icon { font-size: 40px; margin-bottom: 12px; display: block; }
    .role-btn-label { font-weight: 700; margin-bottom: 4px; }
    .role-btn-sub { font-size: 12px; color: #999; margin-top: 4px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #333; }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
    }
    .btn-text {
      background: transparent;
      color: #667eea;
      border: none;
      padding: 8px;
    }
    .btn-text:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .error {
      background: #fed7d7;
      color: #c43030;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      border-left: 4px solid #c43030;
    }
    .error.show { display: block; }

    .otp-inputs {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin: 28px 0;
    }
    .otp-input {
      width: 100%;
      padding: 16px 8px;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .otp-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .dashboard-screen { background: #f5f7fa; }
    .dashboard { padding: 0; }
    .dash-header { background: white; padding: 20px 30px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    .dash-header h2 { font-size: 24px; color: #222; }
    .logout-btn {
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #5568d3; }

    .dash-content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .dash-card { background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; }
    .dash-card h3 { font-size: 22px; margin-bottom: 8px; color: #222; }
    .dash-card p { color: #666; margin-bottom: 20px; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .stat-box { background: #f8f9ff; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea; }
    .stat-label { font-size: 13px; color: #999; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #222; }

    @media (max-width: 768px) {
      .role-buttons { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .login-box { width: 100%; margin: 20px; max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- LOGIN: Role Selection -->
<div id="screen-role" class="screen login-screen active">
  <div class="login-box">
    <h1>⚡ Utility Portal</h1>
    <p>Choose your account type to continue</p>
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('tenant')">
        <span class="role-btn-icon">👤</span>
        <span class="role-btn-label">Tenant</span>
        <span class="role-btn-sub">Manage your unit</span>
      </button>
      <button class="role-btn" onclick="selectRole('landlord')">
        <span class="role-btn-icon">🏢</span>
        <span class="role-btn-label">Landlord</span>
        <span class="role-btn-sub">Manage properties</span>
      </button>
    </div>
  </div>
</div>

<!-- LOGIN: Customer ID -->
<div id="screen-login" class="screen login-screen">
  <div class="login-box">
    <h1>🔐 Login</h1>
    <p id="login-subtitle">Enter your Customer ID</p>
    <div class="form-group">
      <label for="customerId">Customer ID</label>
      <input id="customerId" type="text" placeholder="e.g., CUST-12345" autocomplete="off">
    </div>
    <button class="btn btn-primary" onclick="submitCustomerId()">Continue →</button>
    <div id="login-error" class="error"></div>
    <button class="btn btn-text" onclick="goBack()">← Back to Role Selection</button>
  </div>
</div>

<!-- LOGIN: OTP -->
<div id="screen-otp" class="screen login-screen">
  <div class="login-box">
    <h1>✓ Verify Code</h1>
    <p>Enter the 6-digit code sent to<br><strong id="otp-email">your email</strong></p>
    <div class="otp-inputs" id="otpContainer">
      <input class="otp-input" id="otp1" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="otp2" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="otp3" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="otp4" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="otp5" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="otp6" type="text" maxlength="1" inputmode="numeric">
    </div>
    <button class="btn btn-primary" onclick="verifyOTP()">Verify Code</button>
    <div id="otp-error" class="error"></div>
    <button class="btn btn-text" onclick="goBack()">← Back</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="screen dashboard-screen">
  <div class="dash-header">
    <h2>⚡ Dashboard</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
  <div class="dash-content">
    <div class="dash-card">
      <h3>Welcome, <span id="user-name">User</span>!</h3>
      <p>Your utility account summary</p>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Electric Balance</div>
          <div class="stat-value">৳ 0.00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Water Status</div>
          <div class="stat-value">Active</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Alert Zone</div>
          <div class="stat-value">Safe</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentRole = null;
let currentCustomerId = null;

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
}

function selectRole(role) {
  currentRole = role;
  localStorage.setItem('userRole', role);
  document.getElementById('login-subtitle').textContent = `Enter your ${role === 'tenant' ? 'Tenant' : 'Landlord'} ID`;
  document.getElementById('customerId').value = '';
  showScreen('login');
  setTimeout(() => document.getElementById('customerId').focus(), 100);
}

function goBack() {
  currentCustomerId = null;
  document.getElementById('customerId').value = '';
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('otp-error').classList.remove('show');
  showScreen('role');
}

async function submitCustomerId() {
  const id = document.getElementById('customerId').value.trim();
  const errorEl = document.getElementById('login-error');

  if (!id) {
    errorEl.textContent = '⚠️ Please enter a Customer ID';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');

  try {
    const apiUrl = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(`${apiUrl}?id=${encodeURIComponent(id)}&action=getOTPStep&role=${encodeURIComponent(currentRole)}`);

    if (!res.ok) throw new Error('Network error');
    const data = await res.json();

    if (data.error) {
      errorEl.textContent = '⚠️ ' + data.error;
      errorEl.classList.add('show');
      return;
    }

    currentCustomerId = id;
    document.getElementById('otp-email').textContent = data.email || 'your email';
    showScreen('otp');
    setTimeout(() => document.getElementById('otp1').focus(), 100);
  } catch (err) {
    errorEl.textContent = '⚠️ Error: ' + err.message;
    errorEl.classList.add('show');
  }
}

async function verifyOTP() {
  const otp = Array.from({length: 6}, (_, i) => document.getElementById(`otp${i+1}`).value).join('');
  const errorEl = document.getElementById('otp-error');

  if (otp.length !== 6) {
    errorEl.textContent = '⚠️ Please enter all 6 digits';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');

  try {
    const apiUrl = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(apiUrl, {
      method: 'POST',
      body: JSON.stringify({
        customerId: currentCustomerId,
        otp: otp,
        action: 'verifyOTP',
        role: currentRole
      })
    });

    if (!res.ok) throw new Error('Network error');
    const data = await res.json();

    if (data.error) {
      errorEl.textContent = '⚠️ ' + data.error;
      errorEl.classList.add('show');
      return;
    }

    localStorage.setItem('customerId', currentCustomerId);
    localStorage.setItem('customerName', data.name || 'User');
    localStorage.setItem('customerEmail', data.email || '');

    document.getElementById('user-name').textContent = data.name || 'User';
    showScreen('dashboard');
  } catch (err) {
    errorEl.textContent = '⚠️ Error: ' + err.message;
    errorEl.classList.add('show');
  }
}

function logout() {
  localStorage.removeItem('customerId');
  localStorage.removeItem('customerName');
  localStorage.removeItem('customerEmail');
  currentCustomerId = null;
  currentRole = null;
  showScreen('role');
}

window.addEventListener('load', () => {
  const savedId = localStorage.getItem('customerId');
  if (savedId) {
    document.getElementById('user-name').textContent = localStorage.getItem('customerName') || 'User';
    showScreen('dashboard');
  } else {
    showScreen('role');
  }
});
</script>

</body>
</html>
