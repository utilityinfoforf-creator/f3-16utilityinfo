<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - Utility</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #4c63d2; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.box { background: white; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
h1 { font-size: 28px; margin-bottom: 10px; text-align: center; }
p { text-align: center; color: #666; margin-bottom: 30px; }
.buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
button { padding: 15px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
button:hover { border-color: #4c63d2; background: #f5f7ff; }
input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="box">
  <div id="screen1">
    <h1>⚡ Login</h1>
    <p>Choose your type</p>
    <div class="buttons">
      <button onclick="pick('tenant')">👤 Tenant</button>
      <button onclick="pick('landlord')">🏢 Landlord</button>
    </div>
  </div>

  <div id="screen2" class="hidden">
    <h1>🔐 Enter ID</h1>
    <input id="custid" type="text" placeholder="Customer ID">
    <button onclick="submit()">Continue</button>
    <button onclick="back()">Back</button>
    <p id="msg1" style="color: red;"></p>
  </div>

  <div id="screen3" class="hidden">
    <h1>✓ OTP Code</h1>
    <p>Enter 6 digits</p>
    <input id="otp" type="text" placeholder="000000" maxlength="6">
    <button onclick="verify()">Verify</button>
    <button onclick="back()">Back</button>
    <p id="msg2" style="color: red;"></p>
  </div>

  <div id="screen4" class="hidden">
    <h1>✅ Success!</h1>
    <p>Logged in as <strong id="name">User</strong></p>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>
let role = null;
let custid = null;

function pick(r) { role = r; show(2); }
function back() { show(1); }
function show(n) {
  document.getElementById('screen1').className = n === 1 ? '' : 'hidden';
  document.getElementById('screen2').className = n === 2 ? '' : 'hidden';
  document.getElementById('screen3').className = n === 3 ? '' : 'hidden';
  document.getElementById('screen4').className = n === 4 ? '' : 'hidden';
}

async function submit() {
  custid = document.getElementById('custid').value.trim();
  if (!custid) { document.getElementById('msg1').textContent = '⚠️ Enter ID'; return; }

  try {
    const url = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(`${url}?id=${encodeURIComponent(custid)}&action=getOTPStep&role=${encodeURIComponent(role)}`);
    const data = await res.json();
    if (data.error) { document.getElementById('msg1').textContent = '⚠️ ' + data.error; return; }
    show(3);
  } catch (e) {
    document.getElementById('msg1').textContent = '⚠️ Error: ' + e.message;
  }
}

async function verify() {
  const otp = document.getElementById('otp').value;
  if (otp.length !== 6) { document.getElementById('msg2').textContent = '⚠️ Enter 6 digits'; return; }

  try {
    const url = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
    const res = await fetch(url, { method: 'POST', body: JSON.stringify({ customerId: custid, otp: otp, action: 'verifyOTP', role: role }) });
    const data = await res.json();
    if (data.error) { document.getElementById('msg2').textContent = '⚠️ ' + data.error; return; }
    localStorage.setItem('customerId', custid);
    localStorage.setItem('customerName', data.name || 'User');
    document.getElementById('name').textContent = data.name || 'User';
    show(4);
  } catch (e) {
    document.getElementById('msg2').textContent = '⚠️ Error: ' + e.message;
  }
}

function logout() {
  localStorage.removeItem('customerId');
  document.getElementById('custid').value = '';
  document.getElementById('otp').value = '';
  show(1);
}

window.addEventListener('load', () => {
  if (localStorage.getItem('customerId')) {
    document.getElementById('name').textContent = localStorage.getItem('customerName') || 'User';
    show(4);
  } else {
    show(1);
  }
});
</script>

</body>
</html>
