<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Usage Report - Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="theme-color" content="#0066FF">
</head>
<body>
  <!-- GLOBAL HEADER -->
  <header class="header">
    <a href="../main/index.html" class="header-brand">
      <span class="header-brand-icon">⚡</span>
      <span>Utility</span>
    </a>
    <div class="header-user">
      <div class="user-greeting">
        <div class="user-greeting-name">Monthly Comparison</div>
        <div class="user-greeting-sub">6-Month Analysis</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="../main/index.html" class="btn btn-text">← Back</a>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div style="padding: var(--space-lg) var(--space-md) var(--space-2xl);">
    <div class="container">

      <div class="mb-lg">
        <h2>📊 Monthly Comparison Report</h2>
        <p class="text-muted">Compare your utility usage across multiple months</p>
      </div>

      <!-- CHARTS GRID -->
      <div class="grid grid-cols-2" style="margin-bottom: 32px;">
        <div class="card">
          <div class="section-header mb-lg">
            <h4 class="section-title">Consumption Comparison</h4>
          </div>
          <canvas id="comparisonChart" height="80"></canvas>
        </div>

        <div class="card">
          <div class="section-header mb-lg">
            <h4 class="section-title">Cost Analysis</h4>
          </div>
          <canvas id="costChart" height="80"></canvas>
        </div>
      </div>

      <!-- TABLE CARD -->
      <div class="card">
        <div class="section-header mb-lg">
          <h3 class="section-title">Detailed Comparison</h3>
        </div>
        <div class="table-wrapper">
          <table id="comparisonTable">
            <thead>
              <tr>
                <th>Month</th>
                <th>Usage (kWh)</th>
                <th>Bill Amount</th>
                <th>vs Previous</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="comparisonBody">
              <tr><td colspan="5" style="text-align: center; padding: 32px;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    let compChart, costChart;
    const customerId = localStorage.getItem("customerId");

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark-mode');
      const isDark = document.documentElement.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      location.reload();
    }

    function loadDemoData() {
      const data = [
        { month: 'Jan', usage: 450, bill: 2250 },
        { month: 'Feb', usage: 420, bill: 2100 },
        { month: 'Mar', usage: 380, bill: 1900 },
        { month: 'Apr', usage: 350, bill: 1750 },
        { month: 'May', usage: 500, bill: 2500 },
        { month: 'Jun', usage: 580, bill: 2900 }
      ];

      displayCharts(data);
      displayTable(data);
    }

    function displayCharts(data) {
      const ctxComp = document.getElementById('comparisonChart').getContext('2d');
      compChart = new Chart(ctxComp, {
        type: 'bar',
        data: {
          labels: data.map(d => d.month),
          datasets: [{
            label: 'Usage (kWh)',
            data: data.map(d => d.usage),
            backgroundColor: '#0066FF',
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });

      const ctxCost = document.getElementById('costChart').getContext('2d');
      costChart = new Chart(ctxCost, {
        type: 'line',
        data: {
          labels: data.map(d => d.month),
          datasets: [{
            label: 'Bill Amount (৳)',
            data: data.map(d => d.bill),
            borderColor: '#10B981',
            backgroundColor: 'rgba(16, 185, 129, 0.05)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 5,
            pointBackgroundColor: '#10B981'
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    function displayTable(data) {
      const tbody = document.getElementById('comparisonBody');
      tbody.innerHTML = data.map((d, i) => {
        const prevUsage = i > 0 ? data[i-1].usage : d.usage;
        const diff = d.usage - prevUsage;
        const status = diff > 0 ? '📈 Increase' : diff < 0 ? '📉 Decrease' : '➡️ Same';
        return `
          <tr>
            <td style="font-weight: 600;">${d.month}</td>
            <td>${d.usage} kWh</td>
            <td style="color: var(--color-primary); font-weight: 600;">৳ ${d.bill}</td>
            <td style="color: ${diff > 0 ? '#EF4444' : '#10B981'}; font-weight: 600;">${diff > 0 ? '+' : ''}${diff} kWh</td>
            <td>${status}</td>
          </tr>
        `;
      }).join('');
    }

    initTheme();
    loadDemoData();
  </script>
</body>
</html>
