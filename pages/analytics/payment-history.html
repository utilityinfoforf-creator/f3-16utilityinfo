<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment History - Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <meta name="theme-color" content="#0066FF">
</head>
<body>
  <!-- GLOBAL HEADER -->
  <header class="header">
    <a href="../../pages/main/index.html" class="header-brand">
      <span class="header-brand-icon">⚡</span>
      <span>Utility</span>
    </a>
    <div class="header-user">
      <div class="user-greeting">
        <div class="user-greeting-name">Payment History</div>
        <div class="user-greeting-sub">Recent Transactions</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="../../pages/main/index.html" class="btn btn-text">← Back</a>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div style="padding: var(--space-lg) var(--space-md) var(--space-2xl);">
    <div class="container">

      <div class="mb-lg">
        <h2>📅 Payment History</h2>
        <p class="text-muted">View all your payment transactions and receipts</p>
      </div>

      <!-- STATS GRID -->
      <div class="grid grid-cols-3" style="margin-bottom: 32px;">
        <div class="stat-card">
          <div class="stat-label">Total Paid</div>
          <div class="stat-value" id="stat-total">৳ 0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Payment</div>
          <div class="stat-value" id="stat-recent">৳ 0.00</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Transactions</div>
          <div class="stat-value" id="stat-count">0</div>
        </div>
      </div>

      <!-- PAYMENTS CARD -->
      <div class="card">
        <div class="section-header mb-lg">
          <h3 class="section-title">Recent Payments</h3>
        </div>
        <div id="paymentList" style="display: flex; flex-direction: column; gap: var(--space-md);">
          <div style="text-align: center; padding: 32px 16px; color: var(--text-secondary);">Loading payment history...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec";
    let customerId = localStorage.getItem("customerId");

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark-mode');
      const isDark = document.documentElement.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    async function loadPaymentHistory() {
      if (!customerId) {
        document.getElementById('paymentList').innerHTML = '<div style="text-align: center; color: var(--text-secondary);">Please login first</div>';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}?id=${encodeURIComponent(customerId)}&action=payment_history`);
        const data = await response.json();

        if (data.payments && data.payments.length > 0) {
          displayPayments(data.payments);
          displayStats(data.payments);
        } else {
          document.getElementById('paymentList').innerHTML = '<div style="text-align: center; padding: 32px; color: var(--text-secondary);">No payments found</div>';
        }
      } catch (error) {
        console.error('Error:', error);
        loadDemoData();
      }
    }

    function displayPayments(payments) {
      const list = document.getElementById('paymentList');
      list.innerHTML = payments.map(p => `
        <div style="border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; background: var(--bg-primary);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <span style="font-weight: 600;">${p.method || 'Payment'}</span>
            <span class="badge badge-success">Confirmed</span>
          </div>
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 13px;">
            <div>
              <div class="text-xs text-muted">Date</div>
              <div style="font-weight: 600;">${p.date}</div>
            </div>
            <div>
              <div class="text-xs text-muted">Amount</div>
              <div style="font-weight: 600; color: var(--color-success);">৳ ${p.amount || '0.00'}</div>
            </div>
            <div>
              <div class="text-xs text-muted">ID</div>
              <div style="font-weight: 600; font-family: monospace;">${p.id}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function displayStats(payments) {
      const total = payments.reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
      const recent = parseFloat(payments[0]?.amount || 0);

      document.getElementById('stat-total').textContent = `৳ ${total.toFixed(2)}`;
      document.getElementById('stat-recent').textContent = `৳ ${recent.toFixed(2)}`;
      document.getElementById('stat-count').textContent = payments.length;
    }

    function loadDemoData() {
      const demoPayments = [
        { date: '2024-01-15', amount: '5000', method: 'bKash', id: 'TXN001' },
        { date: '2024-12-10', amount: '3500', method: 'Nagad', id: 'TXN002' },
        { date:  '2024-11-05', amount: '4200', method: 'Bank Transfer', id: 'TXN003' }
      ];
      displayPayments(demoPayments);
      displayStats(demoPayments);
    }

    initTheme();
    loadPaymentHistory();
  </script>
</body>
</html>
