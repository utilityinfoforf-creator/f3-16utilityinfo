<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment History - F3-16 Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <style>
    .page-container { max-width: 1000px; margin: 0 auto; padding: 15px; }
    .page-header {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      padding: 20px 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
    }
    .page-header h1 { font-size: 24px; margin-bottom: 5px; }
    .page-header p { font-size: 14px; }
    .back-link {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 12px;
      background: #667eea;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { background: #764ba2; }
    .table-container {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 12px var(--card-shadow);
      color: var(--text-primary);
      overflow-x: auto;
    }
    .table-container table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table-container th {
      background: var(--bg-secondary);
      padding: 10px 8px;
      text-align: left;
      font-weight: 700;
      color: var(--text-primary);
      border-bottom: 2px solid var(--border-color);
      white-space: nowrap;
    }
    .table-container td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    .table-container tr:hover { background: var(--bg-secondary); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: var(--bg-primary);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px var(--card-shadow);
      text-align: center;
      color: var(--text-primary);
    }
    .stat-value { font-size: 18px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 5px; }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      background: #c8e6c9;
      color: #2e7d32;
    }
    .export-btn {
      background: #667eea;
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 15px;
      width: 100%;
      font-size: 14px;
    }
    .export-btn:hover { background: #764ba2; }
    .empty-state { text-align: center; padding: 30px 15px; color: var(--text-secondary); font-size: 14px; }
    .loading { text-align: center; padding: 30px 15px; color: var(--text-secondary); font-size: 14px; }

    @media (max-width: 768px) {
      .page-container { padding: 10px; }
      .page-header { margin-bottom: 15px; padding: 15px 12px; }
      .page-header h1 { font-size: 20px; margin-bottom: 3px; }
      .page-header p { font-size: 12px; }
      .back-link { margin-bottom: 10px; padding: 6px 10px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
      .stat-box { padding: 12px; }
      .stat-value { font-size: 16px; }
      .stat-label { font-size: 10px; }
      .table-container { padding: 8px; }
      .table-container table { font-size: 12px; }
      .table-container th { padding: 8px 6px; font-size: 11px; }
      .table-container td { padding: 8px 6px; font-size: 12px; }
      .status-badge { font-size: 10px; padding: 3px 6px; }
      .export-btn { padding: 8px 12px; margin-top: 10px; }
    }

    @media (max-width: 480px) {
      .page-container { padding: 8px; }
      .page-header { margin-bottom: 12px; padding: 12px 10px; }
      .page-header h1 { font-size: 18px; }
      .page-header p { font-size: 11px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
      .stat-box { padding: 10px; }
      .stat-value { font-size: 14px; }
      .stat-label { font-size: 9px; }
      .table-container { padding: 6px; }
      .table-container table { font-size: 11px; }
      .table-container th { padding: 6px 4px; font-size: 10px; }
      .table-container td { padding: 6px 4px; font-size: 11px; }
      .status-badge { font-size: 9px; padding: 2px 4px; }
      .export-btn { padding: 8px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <a href="../../main/index.html" class="back-link">← Back to Dashboard</a>

    <div class="page-header">
      <h1>💳 Payment History & Receipts</h1>
      <p>View all your confirmed payments</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="table-container">
      <table id="paymentTable">
        <thead>
          <tr>
            <th>Date & Time</th>
            <th>Flat</th>
            <th>Name</th>
            <th>Transaction ID</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="paymentBody">
          <tr class="loading"><td colspan="5">Loading payment history...</td></tr>
        </tbody>
      </table>
    </div>

    <button class="export-btn" onclick="exportToCSV()">📥 Export as CSV</button>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec";
    let customerId = localStorage.getItem("customerId");
    let paymentData = [];

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    async function loadPaymentHistory() {
      if (!customerId) {
        document.getElementById('paymentBody').innerHTML = '<tr><td colspan="5" class="empty-state">Please login first</td></tr>';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}?id=${encodeURIComponent(customerId)}&action=getPaymentHistory`);
        const data = await response.json();

        if (data.payments && data.payments.length > 0) {
          paymentData = data.payments;
          displayPaymentHistory(data.payments);
          displayStats(data);
        } else {
          document.getElementById('paymentBody').innerHTML = '<tr><td colspan="5" class="empty-state">No payments found</td></tr>';
        }
      } catch (error) {
        console.error('Error loading payment history:', error);
        document.getElementById('paymentBody').innerHTML = '<tr><td colspan="5" class="empty-state">Error loading data. Please try again.</td></tr>';
      }
    }

    function displayPaymentHistory(payments) {
      const tbody = document.getElementById('paymentBody');
      tbody.innerHTML = payments.map(item => `
        <tr>
          <td>${item.timestamp}</td>
          <td>${item.flatNumber}</td>
          <td>${item.name}</td>
          <td><strong>${item.transactionNumber}</strong></td>
          <td><span class="status-badge">${item.status}</span></td>
        </tr>
      `).join('');
    }

    function displayStats(data) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-box">
          <div class="stat-label">Total Payments</div>
          <div class="stat-value">${data.totalPayments || 0}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Last Payment</div>
          <div class="stat-value">${data.lastPayment || 'N/A'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Payment Status</div>
          <div class="stat-value">✅ All Confirmed</div>
        </div>
      `;
    }

    function exportToCSV() {
      if (!paymentData || paymentData.length === 0) {
        alert('No data to export');
        return;
      }

      let csv = 'Date & Time,Flat,Name,Transaction ID,Status\n';
      paymentData.forEach(item => {
        csv += `"${item.timestamp}","${item.flatNumber}","${item.name}","${item.transactionNumber}","${item.status}"\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `payment-history-${customerId}-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    initTheme();
    loadPaymentHistory();
  </script>
</body>
</html>
