<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Usage Trends - Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../../assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="theme-color" content="#0066FF">
</head>
<body>
  <!-- GLOBAL HEADER -->
  <header class="header">
    <a href="../main/index.html" class="header-brand">
      <span class="header-brand-icon">⚡</span>
      <span>Utility</span>
    </a>
    <div class="header-user">
      <div class="user-greeting">
        <div class="user-greeting-name">Usage Trends</div>
        <div class="user-greeting-sub">Consumption Patterns</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      <a href="../main/index.html" class="btn btn-text">← Back</a>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <div style="padding: var(--space-lg) var(--space-md) var(--space-2xl);">
    <div class="container">

      <div class="mb-lg">
        <h2>📈 Usage Trends</h2>
        <p class="text-muted">Analyze your consumption patterns over time</p>
      </div>

      <!-- STATS GRID -->
      <div class="grid grid-cols-4" style="margin-bottom: 32px;">
        <div class="stat-card">
          <div class="stat-label">Current Month</div>
          <div class="stat-value" id="stat-current">0 kWh</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Average</div>
          <div class="stat-value" id="stat-average">0 kWh</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Peak Usage</div>
          <div class="stat-value" id="stat-peak">0 kWh</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Lowest Usage</div>
          <div class="stat-value" id="stat-low">0 kWh</div>
        </div>
      </div>

      <!-- CHART CARD -->
      <div class="card mb-lg">
        <div class="section-header mb-lg">
          <h3 class="section-title">Monthly Consumption</h3>
        </div>
        <canvas id="usageChart" height="80"></canvas>
      </div>

      <!-- TABLE CARD -->
      <div class="card">
        <div class="section-header mb-lg">
          <h3 class="section-title">Monthly Details</h3>
        </div>
        <div class="table-wrapper">
          <table id="usageTable">
            <thead>
              <tr>
                <th>Month</th>
                <th>Consumption (kWh)</th>
                <th>Bill Amount</th>
                <th>Per Unit</th>
              </tr>
            </thead>
            <tbody id="usageBody">
              <tr><td colspan="4" style="text-align: center; padding: 32px;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    let chart;
    const customerId = localStorage.getItem("customerId");

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark-mode');
      const isDark = document.documentElement.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      location.reload();
    }

    function loadDemoUsageTrends() {
      const demoData = [
        { month: 'Jan', usage: 450, bill: '2250' },
        { month: 'Feb', usage: 420, bill: '2100' },
        { month: 'Mar', usage: 380, bill: '1900' },
        { month: 'Apr', usage: 350, bill: '1750' },
        { month: 'May', usage: 500, bill: '2500' },
        { month: 'Jun', usage: 580, bill: '2900' }
      ];

      displayChart(demoData);
      displayTable(demoData);
      displayStats(demoData);
    }

    function displayChart(data) {
      const ctx = document.getElementById('usageChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.month),
          datasets: [{
            label: 'Consumption (kWh)',
            data: data.map(d => d.usage),
            borderColor: '#0066FF',
            backgroundColor: 'rgba(0, 102, 255, 0.05)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 5,
            pointBackgroundColor: '#0066FF',
            pointBorderColor: '#fff'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(0,0,0,0.05)' }
            }
          }
        }
      });
    }

    function displayTable(data) {
      const tbody = document.getElementById('usageBody');
      tbody.innerHTML = data.map(d => `
        <tr>
          <td style="font-weight: 600;">${d.month}</td>
          <td>${d.usage} kWh</td>
          <td style="color: var(--color-primary); font-weight: 600;">৳ ${d.bill}</td>
          <td>৳ ${(parseFloat(d.bill) / d.usage).toFixed(2)}</td>
        </tr>
      `).join('');
    }

    function displayStats(data) {
      const usages = data.map(d => d.usage);
      const current = usages[usages.length - 1];
      const average = (usages.reduce((a, b) => a + b) / usages.length).toFixed(0);
      const peak = Math.max(...usages);
      const low = Math.min(...usages);

      document.getElementById('stat-current').textContent = `${current} kWh`;
      document.getElementById('stat-average').textContent = `${average} kWh`;
      document.getElementById('stat-peak').textContent = `${peak} kWh`;
      document.getElementById('stat-low').textContent = `${low} kWh`;
    }

    initTheme();
    loadDemoUsageTrends();
  </script>
</body>
</html>
