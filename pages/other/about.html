<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Latest Updates - Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../assets/styles.css">
  <style>
    .page-content {
      padding: var(--space-2xl) var(--space-lg) var(--space-3xl);
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: var(--space-3xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-lg);
    }

    .page-header-content h1 {
      font-size: 32px;
      margin-bottom: var(--space-sm);
    }

    .page-header-content p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-tertiary);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.2s;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 600;
    }

    .back-link:hover {
      background: var(--color-primary);
      color: white;
      transform: translateX(-4px);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-lg);
    }

    .article-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      padding: var(--space-lg);
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      height: 100%;
    }

    .article-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary);
    }

    .article-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-md);
    }

    .article-date {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .article-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: var(--space-sm) 0;
      line-height: 1.4;
    }

    .article-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      flex-grow: 1;
    }

    .article-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      margin-top: auto;
      padding-top: var(--space-md);
      border-top: 1px solid var(--border-color);
    }

    .article-tag {
      display: inline-flex;
      align-items: center;
      padding: var(--space-xs) var(--space-sm);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .article-tag.feature {
      background: var(--color-primary-light);
      color: var(--color-primary);
    }

    .article-tag.fix {
      background: var(--color-error-light);
      color: var(--color-error);
    }

    .article-tag.performance {
      background: var(--color-warning-light);
      color: var(--color-warning);
    }

    .article-tag.security {
      background: var(--color-success-light);
      color: var(--color-success);
    }

    .article-tag.news {
      background: var(--color-info-light);
      color: var(--color-info);
    }

    .article-tag.ui {
      background: var(--color-secondary-light);
      color: var(--color-secondary);
    }

    .article-tag.analytics {
      background: var(--color-warning-light);
      color: var(--color-warning);
    }

    .article-tag.payment {
      background: var(--color-success-light);
      color: var(--color-success);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
    }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border-color);
      gap: var(--space-md);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .modal-close:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .modal-body {
      padding: var(--space-lg);
    }

    .modal-date {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--space-md);
      display: block;
    }

    .modal-body p {
      margin-bottom: var(--space-md);
      line-height: 1.8;
    }

    .modal-body ul,
    .modal-body ol {
      margin-left: var(--space-lg);
      margin-bottom: var(--space-md);
    }

    .modal-body li {
      margin-bottom: var(--space-sm);
      line-height: 1.6;
    }

    .modal-body strong {
      color: var(--text-primary);
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-3xl) var(--space-lg);
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: var(--space-md);
    }

    @media (max-width: 768px) {
      .page-content {
        padding: var(--space-xl) var(--space-md) var(--space-2xl);
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: var(--space-2xl);
      }

      .page-header-content h1 {
        font-size: 24px;
      }

      .articles-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        border-radius: 12px 12px 0 0;
        max-height: 90vh;
      }
    }
  </style>
</head>
<body>
  <!-- GLOBAL HEADER -->
  <header class="header">
    <a href="../main/index.html" class="header-brand">
      <span class="header-brand-icon">⚡</span>
      <span>Utility</span>
    </a>
    <div class="header-user">
      <div class="user-greeting">
        <div class="user-greeting-name" id="headerName">Updates</div>
        <div class="user-greeting-sub">Latest Articles</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>
      <a href="../main/index.html" class="back-link">← Back</a>
    </div>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </header>

  <!-- MAIN CONTENT -->
  <div class="page-content">
    <div class="page-header">
      <div class="page-header-content">
        <h1>📰 Latest Updates</h1>
        <p>Stay informed about the latest changes and improvements to your Utility Dashboard</p>
      </div>
    </div>

    <div id="articlesContainer" class="articles-grid">
      <div class="empty-state">
        <p>Loading articles...</p>
      </div>
    </div>
  </div>

  <!-- Article Modal -->
  <div id="articleModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <span class="modal-date" id="modalDate"></span>
        <div id="modalBody"></div>
      </div>
    </div>
  </div>

  <script>
    // Initialize theme
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme === 'dark' || (savedTheme === 'auto' && prefersDark) ? 'dark' : 'light';

      if (theme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    // Toggle theme
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const isDark = document.documentElement.classList.contains('dark-mode');
      document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
    }

    initTheme();
    updateThemeIcon();

    // Load articles
    async function loadArticles() {
      try {
        const response = await fetch('../../assets/articles.json');
        const data = await response.json();
        displayArticles(data.articles);
      } catch (error) {
        console.error('Error loading articles:', error);
        document.getElementById('articlesContainer').innerHTML =
          '<div class="empty-state"><p>Could not load articles. Please try again later.</p></div>';
      }
    }

    function displayArticles(articles) {
      const container = document.getElementById('articlesContainer');
      container.innerHTML = '';

      if (!articles || articles.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No articles available yet.</p></div>';
        return;
      }

      articles.forEach((article) => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => openModal(article);

        const tagsHTML = article.tags
          .map(tag => `<span class="article-tag ${tag.toLowerCase()}">${tag}</span>`)
          .join('');

        const dateStr = new Date(article.date).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });

        card.innerHTML = `
          <div class="article-header">
            <span class="article-date">${dateStr}</span>
          </div>
          <h3 class="article-title">${article.title}</h3>
          <p class="article-description">${article.description}</p>
          <div class="article-tags">${tagsHTML}</div>
        `;

        container.appendChild(card);
      });
    }

    function openModal(article) {
      document.getElementById('modalTitle').textContent = article.title;
      document.getElementById('modalDate').textContent = new Date(article.date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById('modalBody').innerHTML = article.fullContent;
      document.getElementById('articleModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('articleModal').classList.remove('active');
    }

    window.onclick = function(event) {
      const modal = document.getElementById('articleModal');
      if (event.target === modal) {
        closeModal();
      }
    };

    // Load articles on page load
    document.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
