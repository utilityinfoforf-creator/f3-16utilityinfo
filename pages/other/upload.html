<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Upload Bill Image</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f6f8fb} .card{background:white;padding:18px;border-radius:10px;max-width:760px;margin:0 auto;box-shadow:0 8px 30px rgba(30,50,80,0.06)} input,button{font-size:15px;padding:10px;border-radius:8px;border:1px solid #dfe6f0} label{display:block;margin-top:12px;font-weight:700;color:#333}</style>
</head>
<body>
  <div class="card">
    <h2>Import billing from CSV</h2>
    <p>Upload a CSV exported from your spreadsheet. Map the CSV columns below and submit all rows to the Google Sheet.</p>

    <label>Select CSV file</label>
    <input id="file" type="file" accept=".csv">

    <div id="preview" style="display:none; margin-top:14px">
      <label>CSV Preview (first 10 rows)</label>
      <div id="preview-table" style="max-height:220px; overflow:auto; border:1px solid #e6edf6; padding:8px; background:#fafcff"></div>

      <label style="margin-top:10px">Map columns</label>
      <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-width:720px;">
        <div>
          <div style="font-size:13px; color:#333; font-weight:700;">Customer ID</div>
          <select id="col-cust"></select>
        </div>
        <div>
          <div style="font-size:13px; color:#333; font-weight:700;">YearMonth or Date</div>
          <select id="col-date"></select>
        </div>
        <div>
          <div style="font-size:13px; color:#333; font-weight:700;">Electric</div>
          <select id="col-electric"></select>
        </div>
        <div>
          <div style="font-size:13px; color:#333; font-weight:700;">Water</div>
          <select id="col-water"></select>
        </div>
        <div>
          <div style="font-size:13px; color:#333; font-weight:700;">Gas</div>
          <select id="col-gas"></select>
        </div>
      </div>

      <div style="margin-top:12px; display:flex; gap:10px;">
        <button id="submit">Submit CSV to Spreadsheet</button>
        <button id="clear">Clear</button>
      </div>

      <p id="status" style="color:#b00020; margin-top:10px"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const fileEl = document.getElementById('file');
    const preview = document.getElementById('preview');
    const previewTable = document.getElementById('preview-table');
    const statusEl = document.getElementById('status');
    const clearBtn = document.getElementById('clear');
    const submitBtn = document.getElementById('submit');

    let parsedData = null;
    let headers = [];

    function floatVal(v){
      if (v === null || v === undefined) return 0;
      const s = String(v).replace(/[,₹৳\s]/g,'').trim();
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }

    fileEl.addEventListener('change', () => {
      statusEl.textContent = '';
      const f = fileEl.files && fileEl.files[0];
      if (!f) return;
      Papa.parse(f, {
        header: true,
        dynamicTyping: false,
        skipEmptyLines: true,
        complete: function(results){
          parsedData = results.data;
          headers = results.meta.fields || [];
          renderPreview(parsedData, headers);
          populateSelectors(headers);
        },
        error: function(err){
          statusEl.textContent = 'CSV parse error: ' + err.message;
        }
      });
    });

    function renderPreview(rows, headers){
      preview.style.display = 'block';
      previewTable.innerHTML = '';
      const table = document.createElement('table');
      table.style.borderCollapse = 'collapse';
      table.style.width = '100%';
      const thead = document.createElement('thead');
      const htr = document.createElement('tr');
      headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; th.style.border='1px solid #e6edf6'; th.style.padding='6px'; htr.appendChild(th); });
      thead.appendChild(htr);
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      rows.slice(0,10).forEach(r => {
        const tr = document.createElement('tr');
        headers.forEach(h => { const td = document.createElement('td'); td.textContent = r[h]; td.style.border='1px solid #eef3fb'; td.style.padding='6px'; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      previewTable.appendChild(table);
    }

    function populateSelectors(hdrs){
      ['col-cust','col-date','col-electric','col-water','col-gas'].forEach(id => {
        const sel = document.getElementById(id);
        sel.innerHTML = '';
        const empty = document.createElement('option'); empty.value=''; empty.textContent='-- select column --'; sel.appendChild(empty);
        hdrs.forEach(h => { const o = document.createElement('option'); o.value = h; o.textContent = h; sel.appendChild(o); });
      });
    }

    clearBtn.addEventListener('click', ()=>{
      fileEl.value = '';
      parsedData = null;
      headers = [];
      preview.style.display = 'none';
      previewTable.innerHTML = '';
      statusEl.textContent = '';
    });

    submitBtn.addEventListener('click', async ()=>{
      statusEl.style.color = '#333';
      statusEl.textContent = 'Submitting...';
      if(!parsedData || parsedData.length === 0){ statusEl.style.color='#b00020'; statusEl.textContent='No CSV data to submit'; return; }

      const map = {
        cust: document.getElementById('col-cust').value,
        date: document.getElementById('col-date').value,
        electric: document.getElementById('col-electric').value,
        water: document.getElementById('col-water').value,
        gas: document.getElementById('col-gas').value
      };
      if(!map.cust){ statusEl.style.color='#b00020'; statusEl.textContent='Customer ID column required'; return; }

      const rows = parsedData.map(r => ({
        customerId: String(r[map.cust] || '').trim(),
        yearMonth: String(r[map.date] || '').trim(),
        electric: floatVal(r[map.electric]),
        water: floatVal(r[map.water]),
        gas: floatVal(r[map.gas])
      })).filter(r => r.customerId);

      if(rows.length === 0){ statusEl.style.color='#b00020'; statusEl.textContent='No valid rows found'; return; }

      const payload = { action: 'importCSVBulk', rows: rows };
      const url = 'https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec';
      try {
        const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if(data && data.error){ statusEl.style.color='#b00020'; statusEl.textContent = 'Server: ' + data.error; return; }
        statusEl.style.color = '#0b7a3f';
        statusEl.textContent = 'Imported ' + (data.inserted || 0) + ' rows.';
      } catch (err){ statusEl.style.color='#b00020'; statusEl.textContent = 'Network or server error: ' + err.message; }
    });
  </script>
</body>
</html>
