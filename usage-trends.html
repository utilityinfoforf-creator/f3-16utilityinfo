<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Usage Trends - F3-16 Utility Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .page-container { max-width: 1200px; margin: 0 auto; padding: 15px; }
    .page-header {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      padding: 20px 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
    }
    .page-header h1 { font-size: 24px; margin-bottom: 5px; }
    .page-header p { font-size: 14px; }
    .back-link {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 12px;
      background: #667eea;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .back-link:hover { background: #764ba2; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: var(--bg-primary);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px var(--card-shadow);
      text-align: center;
      color: var(--text-primary);
    }
    .stat-value { font-size: 18px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 5px; }
    .chart-container {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 12px var(--card-shadow);
      margin-bottom: 20px;
      color: var(--text-primary);
      position: relative;
      height: auto;
      min-height: 300px;
    }
    .chart-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .trend-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .trend-badge.increasing { background: #ffebee; color: #c62828; }
    .trend-badge.decreasing { background: #e8f5e9; color: #2e7d32; }
    .export-btn {
      background: #667eea;
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 15px;
      width: 100%;
      font-size: 14px;
    }
    .export-btn:hover { background: #764ba2; }
    .empty-state { text-align: center; padding: 30px 15px; color: var(--text-secondary); font-size: 14px; }
    .loading { text-align: center; padding: 30px 15px; color: var(--text-secondary); font-size: 14px; }

    @media (max-width: 768px) {
      .page-container { padding: 10px; }
      .page-header { margin-bottom: 15px; padding: 15px 12px; }
      .page-header h1 { font-size: 20px; margin-bottom: 3px; }
      .page-header p { font-size: 12px; }
      .back-link { margin-bottom: 10px; padding: 6px 10px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
      .stat-box { padding: 12px; }
      .stat-value { font-size: 16px; }
      .stat-label { font-size: 10px; }
      .chart-container { padding: 10px; margin-bottom: 15px; min-height: 250px; }
      .chart-title { font-size: 14px; margin-bottom: 10px; }
      .trend-badge { padding: 6px 12px; font-size: 12px; }
      .export-btn { padding: 8px 12px; margin-top: 10px; }
    }

    @media (max-width: 480px) {
      .page-container { padding: 8px; }
      .page-header { margin-bottom: 12px; padding: 12px 10px; }
      .page-header h1 { font-size: 18px; }
      .page-header p { font-size: 11px; }
      .stats-grid { grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px; }
      .stat-box { padding: 10px; }
      .stat-value { font-size: 14px; }
      .stat-label { font-size: 9px; }
      .chart-container { padding: 8px; margin-bottom: 12px; min-height: 200px; }
      .chart-title { font-size: 13px; margin-bottom: 8px; }
      .trend-badge { padding: 5px 10px; font-size: 11px; }
      .export-btn { padding: 8px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <a href="index.html" class="back-link">← Back to Dashboard</a>

    <div class="page-header">
      <h1>📈 Usage Trends (12 Months)</h1>
      <p>Your consumption analysis and patterns</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div id="trendsContainer"></div>

    <button class="export-btn" onclick="downloadChart()">📥 Download Chart as Image</button>
  </div>

  <script>
    const API_BASE = "https://script.google.com/macros/s/AKfycbzUQeJKLBRCjQG928fnIdJ7Tlg-JR0072ENK-K2_07NBOxWsH9zs0qd5CrcoQW_Mbz3lA/exec";
    let customerId = localStorage.getItem("customerId");
    let chart = null;

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    }

    async function loadUsageTrends() {
      if (!customerId) {
        document.getElementById('trendsContainer').innerHTML = '<div class="empty-state">Please login first</div>';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}?id=${encodeURIComponent(customerId)}&action=getUsageTrends`);
        const data = await response.json();

        if (data.data && data.data.length > 0) {
          displayStats(data);
          displayChart(data.data);
        } else {
          document.getElementById('trendsContainer').innerHTML = '<div class="empty-state">No usage data available</div>';
        }
      } catch (error) {
        console.error('Error loading usage trends:', error);
        document.getElementById('trendsContainer').innerHTML = '<div class="empty-state">Error loading data. Please try again.</div>';
      }
    }

    function displayStats(data) {
      const trend = data.trend || 'Decreasing';
      const trendClass = trend.includes('Increasing') ? 'increasing' : 'decreasing';

      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-box">
          <div class="stat-label">Avg Electric</div>
          <div class="stat-value">${data.avgElectric} kWh</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Avg Water</div>
          <div class="stat-value">${data.avgWater} L</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Avg Gas</div>
          <div class="stat-value">${data.avgGas} m³</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Trend</div>
          <div style="margin-top: 10px;">
            <span class="trend-badge ${trendClass}">${trend}</span>
          </div>
        </div>
      `;
    }

    function displayChart(data) {
      const container = document.getElementById('trendsContainer');
      container.innerHTML = `
        <div class="chart-container">
          <div class="chart-title">💡 Consumption Over Last 12 Months</div>
          <canvas id="usageChart"></canvas>
        </div>
      `;

      const ctx = document.getElementById('usageChart').getContext('2d');
      const labels = data.map(d => d.month);
      const electricData = data.map(d => d.electric);
      const waterData = data.map(d => d.water);
      const gasData = data.map(d => d.gas);

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Electric (kWh)',
              data: electricData,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.1)',
              tension: 0.4,
              fill: true
            },
            {
              label: 'Water (L)',
              data: waterData,
              borderColor: '#43a047',
              backgroundColor: 'rgba(67, 160, 71, 0.1)',
              tension: 0.4,
              fill: true
            },
            {
              label: 'Gas (m³)',
              data: gasData,
              borderColor: '#fb8c00',
              backgroundColor: 'rgba(251, 140, 0, 0.1)',
              tension: 0.4,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              labels: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary') || '#111'
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') || '#666'
              },
              grid: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--border-color') || '#ddd'
              }
            },
            x: {
              ticks: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary') || '#666'
              },
              grid: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--border-color') || '#ddd'
              }
            }
          }
        }
      });
    }

    function downloadChart() {
      if (chart) {
        const image = chart.toBase64Image();
        const link = document.createElement('a');
        link.href = image;
        link.download = `usage-trends-${customerId}-${new Date().toISOString().split('T')[0]}.png`;
        link.click();
      }
    }

    initTheme();
    loadUsageTrends();
  </script>
</body>
</html>
