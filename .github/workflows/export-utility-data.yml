name: Export Utility Data

# Run daily at 02:00 UTC (adjust time as needed)
on:
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    name: Export Dashboard Data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export data from Apps Script
        id: export
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_EXPORT_URL }}
        run: |
          if [ -z "$APPS_SCRIPT_URL" ]; then
            echo "❌ Error: APPS_SCRIPT_EXPORT_URL secret not configured"
            exit 1
          fi

          echo "📥 Fetching data from Apps Script..."
          curl -s "$APPS_SCRIPT_URL?action=export" -o data.json

          if [ ! -s data.json ]; then
            echo "❌ Error: data.json is empty"
            exit 1
          fi

          # Verify it's valid JSON
          if ! jq empty data.json 2>/dev/null; then
            echo "❌ Error: Invalid JSON in response"
            cat data.json
            exit 1
          fi

          echo "✅ Data exported successfully"
          echo "Customers: $(jq '.customers | length' data.json)"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi

      - name: Configure Git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add data.json
          git commit -m "chore: update utility data (auto-export)"
          git push

      - name: Verify GitHub Pages
        run: |
          echo "📄 GitHub Pages Configuration:"
          echo "  - Dashboard: dashboard-static.html"
          echo "  - Data: data.json"
          echo "  - URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dashboard-static.html"
